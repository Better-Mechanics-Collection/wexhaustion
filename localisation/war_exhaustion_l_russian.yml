 #DECISIONS
 war_exhaustion_category:0 "общественная усталость от войны"
 war_exhaustion_category_desc:0 "Во время войны сохранение стабильного и единого фронта имеет решающее значение для успеха нашей нации. Голоса инакомыслящих, если их не остановить, могут подорвать саму основу наших военных усилий и поставить под угрозу благополучие нашего народа. Военное истощение — это надвигающаяся угроза, к которой мы должны отнестись со стратегической решимостью."
 we_home_front_address:0 "Обратиться к тылу"
 we_home_front_address_desc:0 "Посвятить время публичным выступлениям, радиотрансляциям и местным общественным мероприятиям, чтобы напомнить гражданам о деле, за которое они сражаются. Небольшие, но последовательные усилия по поддержанию морального духа тыла."
 we_war_hero_narratives:0 "Создать истории о героях войны"
 we_war_hero_narratives_desc:0 "Выявить и продвигать людей в армии, которые продемонстрировали исключительную храбрость или жертвенность. Разработать подробные рассказы об их опыте и представить их как национальных героев."
 we_war_bond_drives:0 "Кампании по выпуску военных облигаций"
 we_war_bond_drives_desc:0 "Инициировать кампании по выпуску военных облигаций, чтобы привлечь граждан к финансовой поддержке войны. Это не только обеспечивает финансирование войны, но и воспитывает чувство участия и общей ответственности."
 we_public_recognitions:0 "Произнесите патриотическую речь"
 we_public_recognitions_desc:0 "Произносите волнующие патриотические речи, восхваляющие мужество и жертвенность наших солдат. Выступайте с этими впечатляющими речами во время церемоний, где выдающиеся солдаты награждаются медалями и почестями. Усиливайте значимость этих событий посредством широкого освещения в СМИ, способствуя национальной гордости и единству."
 we_documentary_films:0 "Снимать документальные фильмы"
 we_documentary_films_desc:0 "Создавать документальные фильмы и радиопрограммы, рассказывающие истории настоящих солдат и их героических поступков. Используйте эмоциональное повествование, интервью и звуковые эффекты, чтобы вызвать у слушателя или зрителя чувство восхищения и гордости."
 we_arrest_and_detain_dissidents:0 "Арест и задержание диссидентов"
 we_arrest_and_detain_dissidents_desc:0 "Разрешить силам безопасности выявлять и задерживать лиц, считающихся инакомыслящими или критиками войны. Задерживать их без суда и следствия, чтобы предотвратить распространение антивоенных настроений."
 we_rationing_reevaluation:0 "Переоценка нормирования питания"
 we_rationing_reevaluation_desc:0 "Пересмотреть политику нормирования и рассмотреть возможность смягчения ограничений на некоторые неосновные товары. Это позволит гражданам ощутить более высокий уровень жизни и будет способствовать позитивному восприятию управления правительством военными усилиями."
 we_consumer_goods_subsidies:0 "Субсидии на потребительские товары"
 we_consumer_goods_subsidies_desc:0 " Реализовать субсидии для отраслей, ориентированных на производство потребительских товаров. Предоставляя финансовые стимулы, правительство поощряет предприятия переориентировать свое производство на товары, которые повышают благосостояние населения, тем самым уменьшая истощение от войны."
 martial_law_start:0 "Объявить военное положение"
 martial_law_start_desc:0 "Предать гласности суровые последствия инакомыслия, включая тюремное заключение, потерю средств к существованию или нанесение вреда членам семьи. Создавать атмосферу страха, чтобы удержать людей от открытого противостояния правительству или военным действиям."
 accede_to_protests:0 "Удовлетворить требования протестующих"
 accede_to_protests_desc:0 "В свете растущего истощения от войны, терзающего нашу страну, все больше голосов среди населения поднялось в знак протеста, требуя немедленных действий по облегчению бремени конфликта. Удовлетворение их требований может обеспечить временное разрешение текущего кризиса, но оно сопряжено с собственным набором проблем.\n(Принятие определенных доктрин, а именно Human Wave Offensive (0,3 в неделю), Non-Discriminatory Conscription (0,2 в неделю) и Volkssturm (0,2 в неделю) повышает истощение от войны)"

